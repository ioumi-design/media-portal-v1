<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Collections – Accor Media Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="components/components.css?v=7" />
  <style>
    /* Page body: side-by-side layout */
    .page-body { flex-direction: row; overflow: hidden; }

    /* ── Left panel ─────────────────────────────────────────────────── */
    .hc-left {
      flex: 0 0 var(--panel-width);
      width: var(--panel-width);
      max-width: var(--panel-width);
      min-width: var(--panel-width);
      background: var(--color-surface-container-mid);
      overflow-y: auto;
      padding: 36px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid var(--color-outline-low);
    }
    .hc-menu { display: flex; flex-direction: column; gap: 2px; }
    .hc-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-radius: var(--br-surface);
      font-size: 16px;
      line-height: 24px;
      color: var(--color-on-surface-hi);
      cursor: pointer;
      transition: background 120ms;
      text-decoration: none;
    }
    .hc-menu-item:hover { background: rgba(6,132,132,.08); }
    .hc-menu-item--active {
      background: var(--color-surface-container-low);
      font-weight: 500;
    }
    .hc-menu-item--active:hover { background: var(--color-surface-container-low); }
    .hc-panel-sep { height: 1px; background: var(--color-outline-low); flex-shrink: 0; }
    .hc-panel-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 16px;
    }
    .hc-panel-link {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-label);
      font-size: 14px;
      line-height: 20px;
      color: var(--color-on-surface-mid);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-align: left;
      text-decoration: none;
    }
    .hc-panel-link:hover { text-decoration: underline; }

    /* ── Right / main content ────────────────────────────────────────── */
    .hc-main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      background: var(--color-surface-container-low);
      padding: 36px var(--grid-margin) 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Title row */
    .hc-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }
    .hc-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      line-height: 40px;
      letter-spacing: 0.5px;
      color: var(--color-on-surface-hi);
    }
    .btn-create {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-radius: var(--br-full);
      border: none;
      font-family: var(--font-label);
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      cursor: pointer;
      transition: background 120ms;
      white-space: nowrap;
    }
    .btn-create:hover { background: #3a2d80; }

    /* Inner tab bar */
    .hc-tabs {
      display: flex;
      gap: 20px;
      position: relative;
      border-bottom: 1px solid var(--color-outline-low);
    }
    .hc-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 4px solid transparent;
      margin-bottom: -1px;
      font-family: var(--font-label);
      font-size: 16px;
      line-height: 24px;
      color: var(--color-on-surface-hi);
      cursor: pointer;
      white-space: nowrap;
      transition: color 120ms;
    }
    .hc-tab--active {
      font-weight: 500;
      border-bottom-color: var(--color-accent);
      color: var(--color-on-surface-hi);
    }
    .hc-tab__count {
      color: var(--color-on-surface-low);
      font-weight: 400;
    }

    /* Section title */
    .hc-section-title {
      font-family: var(--font-body);
      font-size: 24px;
      font-weight: 700;
      line-height: 32px;
      color: var(--color-on-surface-hi);
    }

    /* Collections grid */
    .coll-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* Collection card */
    .coll-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      position: relative;
    }
    .coll-card__thumb {
      width: 100%;
      aspect-ratio: 309 / 213;
      border-radius: var(--br-surface);
      overflow: hidden;
      flex-shrink: 0;
    }
    .coll-card__thumb svg,
    .coll-card__thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .coll-card__body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .coll-card__title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .coll-card__title {
      flex: 1;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      line-height: 24px;
      letter-spacing: 0.5px;
      color: var(--color-on-surface-hi);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-width: 0;
    }
    .coll-card__menu-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .coll-card__menu-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--br-full);
      border: none;
      background: none;
      color: var(--color-on-surface-hi);
      cursor: pointer;
      transition: background 120ms;
    }
    .coll-card__menu-btn:hover,
    .coll-card__menu-btn--active { background: var(--color-on-surface-hi); color: #fff; }
    .coll-card__menu-btn--active + .ctx-menu { display: block; }
    .coll-card__count {
      font-size: 16px;
      line-height: 24px;
      color: var(--color-on-surface-mid);
    }
    .coll-card__desc {
      font-size: 16px;
      line-height: 24px;
      color: var(--color-on-surface-low);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .coll-card__link {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
      line-height: 24px;
      color: var(--color-link);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .coll-card__link:hover { text-decoration: underline; }

    /* ── Empty state ────────────────────────────────────────────────── */
    .coll-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      padding: 28px 0;
      width: 100%;
    }
    .coll-empty__card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 403px;
    }
    .coll-empty__thumb {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .coll-empty__thumb img {
      width: 280px;
      height: auto;
    }
    .btn-create--accent {
      background: var(--color-accent);
    }
    .btn-create--accent:hover {
      background: #046f6f;
    }
    .coll-empty__title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      line-height: 32px;
      letter-spacing: 0.5px;
      color: var(--color-on-surface-hi);
      text-align: center;
      width: 100%;
    }

  </style>
</head>

<script>
/* ── Collection card context menu (CSS-hover driven, no JS toggle needed) */

/* ── Collection cards data & render ─────────────────────────────────── */
/* Start empty to showcase the empty state; clicking "Create a new collection" fills demo data */
var COLLECTIONS = [];

var COLORS = ['#C5D8E8','#D8C5E8','#C5E8D8','#E8D8C5','#C5C5E8','#E8C5D8'];

var _IMG_ERR_HTML = '<div style="width:100%;height:100%;background:#ECEDF4;display:flex;align-items:center;justify-content:center;"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="4" fill="#ECEDF4"/><path d="M8 36l10-12 7 8 5-6 10 10H8z" fill="#C4C6D0"/><circle cx="32" cy="16" r="4" fill="#E8A000"/></svg></div>';
function _imgErr(el) {
  el.onerror = null;
  var card = el.closest('.coll-card');
  if (card) card.classList.add('img-broken');
  el.parentNode.innerHTML = _IMG_ERR_HTML;
}

function makeThumb(i, thumbnailUrl) {
  if (thumbnailUrl) {
    return '<img src="' + thumbnailUrl + '" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="_imgErr(this)">';
  }
  var bg = COLORS[i % COLORS.length];
  return '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 309 213" preserveAspectRatio="xMidYMid slice"><rect width="309" height="213" fill="' + bg + '"/><text x="154.5" y="113" text-anchor="middle" dominant-baseline="middle" font-family="Roboto,sans-serif" font-size="14" fill="#7a7a8c">Image placeholder</text></svg>';
}

function buildCard(col, i) {
  return (
    '<div class="coll-card">' +
      '<div class="coll-card__thumb" style="cursor:pointer;" onclick="window.location.href=\'collection.html?id=' + col.id + '\'">' + makeThumb(i, col.thumbnailUrl) + '</div>' +
      '<div class="coll-card__body">' +
        '<div class="coll-card__title-row">' +
          '<span class="coll-card__title">' + col.title + '</span>' +
          '<div class="coll-card__menu-wrap">' +
            '<button class="coll-card__menu-btn" type="button" aria-label="Options for ' + col.title + '" onclick="hubToggleMenu(event,\'ctx-' + col.id + '\')">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>' +
            '</button>' +
            '<div class="ctx-menu" id="ctx-' + col.id + '">' +
              '<button class="ctx-menu__item" type="button" onclick="event.stopPropagation();hubOpenEdit(\'' + col.id + '\')">' +
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                'Edit' +
              '</button>' +
              '<button class="ctx-menu__item" type="button" onclick="event.stopPropagation();hubOpenShare(\'' + col.id + '\')">' +
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 7l10 7 10-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                'Share via mail' +
              '</button>' +
              '<button class="ctx-menu__item" type="button" onclick="event.stopPropagation();hubOpenDownload(\'' + col.id + '\')">' +
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12M8 11l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                'Download' +
              '</button>' +
              '<button class="ctx-menu__item ctx-menu__item--danger" type="button" onclick="event.stopPropagation();hubOpenDelete(\'' + col.id + '\')">' +
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                'Delete' +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<p class="coll-card__count">Assets (' + col.count + ')</p>' +
        '<p class="coll-card__desc">' + col.desc + '</p>' +
        '<button class="coll-card__link" type="button" onclick="location.href=\'collection.html?id=' + col.id + '\'">' +
          'See this collection' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M12 5l7 7-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>'
  );
}

function renderCollections() {
  var count = COLLECTIONS.length;
  var tabCount    = document.getElementById('tab-count');
  var sectionTitle = document.getElementById('section-title');
  var emptyState  = document.getElementById('coll-empty');
  var grid        = document.getElementById('coll-grid');

  tabCount.textContent = '(' + count + ')';

  if (count === 0) {
    sectionTitle.style.display = 'none';
    emptyState.hidden = false;
    grid.innerHTML = '';
    grid.hidden = true;
  } else {
    sectionTitle.style.display = '';
    emptyState.hidden = true;
    grid.hidden = false;
    var html = '';
    for (var i = 0; i < count; i++) {
      html += buildCard(COLLECTIONS[i], i);
    }
    grid.innerHTML = html;
    _scheduleResortBroken(grid, '.coll-card');
  }
}

function _scheduleResortBroken(container, selector) {
  setTimeout(function() {
    var broken = Array.from(container.querySelectorAll(selector + '.img-broken'));
    if (!broken.length) return;
    broken.forEach(function(c) { c.style.opacity = '0'; });
    setTimeout(function() {
      broken.forEach(function(c) {
        container.appendChild(c);
        c.style.transition = 'opacity 300ms ease';
        c.style.opacity = '';
      });
      setTimeout(function() { broken.forEach(function(c) { c.style.transition = ''; }); }, 350);
    }, 200);
  }, 1500);
}

/* Demo helper: clicking "Create a new collection" in empty state populates sample data */
function demoAddCollections() {
  COLLECTIONS = [
    { id: 'c1', title: 'Accor Hotels Paris',      count: 8,  desc: 'A curated selection of Parisian hotel visuals for press and marketing campaigns across European markets.', hasImages: true },
    { id: 'c2', title: 'Novotel Architecture',     count: 12, desc: 'Interior and exterior architecture shots from Novotel properties worldwide, suitable for brand guidelines.', hasImages: true },
    { id: 'c3', title: 'Sofitel Branding Assets',  count: 5,  desc: 'Official brand photography for Sofitel properties, including lobby, rooms, and F&B experiences.', hasImages: true },
    { id: 'c4', title: 'ibis Rooms Campaign',       count: 24, desc: 'Room photography for the global ibis rebranding campaign, covering all ibis sub-brands.', hasImages: true },
    { id: 'c5', title: 'Mercure Social Media Kit',  count: 11, desc: 'Social media-ready assets for Mercure Hotels featuring regional hotels and seasonal promotions.', hasImages: false },
    { id: 'c6', title: 'Pullman Lifestyle Series',  count: 7,  desc: 'Lifestyle photography series for Pullman Hotels, featuring pool, wellness, and dining environments.', hasImages: true },
  ];
  renderCollections();
}

/* ── Hub helpers ─────────────────────────────────────────────────────── */
function hubFindCol(id) {
  for (var i = 0; i < COLLECTIONS.length; i++) {
    if (COLLECTIONS[i].id === id) return COLLECTIONS[i];
  }
  return null;
}

function hubCloseAllMenus() {
  document.querySelectorAll('.ctx-menu').forEach(function(m) { m.style.display = ''; });
  document.querySelectorAll('.coll-card__menu-btn').forEach(function(b) {
    b.setAttribute('aria-expanded', 'false');
    b.classList.remove('coll-card__menu-btn--active');
  });
}

function hubToggleMenu(e, menuId) {
  e.stopPropagation();
  var menu = document.getElementById(menuId);
  var btn = e.currentTarget;
  var isOpen = btn.classList.contains('coll-card__menu-btn--active');
  hubCloseAllMenus();
  if (!isOpen) {
    btn.classList.add('coll-card__menu-btn--active');
    btn.setAttribute('aria-expanded', 'true');
  }
}

function hubOpenCreateModal() {
  MP.createCollection.open(function(title, desc) {
    DB.createCollection(title, desc || '').then(function(newCol) {
      COLLECTIONS.push({ id: newCol.id, title: title, desc: desc || '', count: 0, thumbnailUrl: null });
      renderCollections();
      MP.snackbar.show('Collection "' + title + '" created.');
    });
  });
}

function hubOpenEdit(id) {
  hubCloseAllMenus();
  var col = hubFindCol(id);
  if (!col) return;
  MP.editCollection.open(col.title, col.desc || '', function(newTitle, newDesc) {
    col.title = newTitle;
    col.desc  = newDesc;
    DB.updateCollection(id, newTitle, newDesc);
    renderCollections();
    MP.snackbar.show('Collection updated.');
  });
}

function hubOpenShare(id) {
  hubCloseAllMenus();
  var col = hubFindCol(id);
  if (!col) return;
  MP.shareCollection.open(col.title, function() {
    MP.snackbar.show('Mail is sent with success.');
  });
}

function hubOpenDownload(id) {
  hubCloseAllMenus();
  var col = hubFindCol(id);
  if (!col) return;
  MP.download.open({ hasImages: col.hasImages !== false, hasOther: true, onSuccess: function() {
    MP.snackbar.show('Download started.');
  }});
}

function hubOpenDelete(id) {
  hubCloseAllMenus();
  var col = hubFindCol(id);
  if (!col) return;
  var colId = id;
  var colName = col.title;
  MP.deleteCollection.open({
    body: 'You are about to delete the selected collection. This action cannot be undone once you confirm the deletion.',
    onConfirm: function() {
      DB.deleteCollection(colId).then(function() {
        COLLECTIONS = COLLECTIONS.filter(function(c) { return c.id !== colId; });
        renderCollections();
        MP.snackbar.show(colName + ' deleted.');
      });
    }
  });
}

document.addEventListener('DOMContentLoaded', function() {
  DB.getCollections().then(function(collections) {
    DB.getAssets().then(function(assets) {
      /* Merge DB assets with SUMMER_ASSETS for thumbnail lookup */
      var allAssets = (window.SUMMER_ASSETS || []).concat(assets);
      COLLECTIONS = collections.map(function(col) {
        var firstAsset = col.assetIds && col.assetIds[0]
          ? allAssets.find(function(a) { return a.id === col.assetIds[0]; }) : null;
        return {
          id: col.id,
          title: col.title,
          count: col.assetIds ? col.assetIds.length : 0,
          desc: col.description,
          thumbnailUrl: firstAsset ? firstAsset.thumbnail : null
        };
      });
      renderCollections();
    });
  });
  document.addEventListener('click', function() { hubCloseAllMenus(); });
});
</script>
<script>(function(){var s=localStorage.getItem('mp_scenario')||'1';var b=document.getElementById('scen-btn-'+s);if(b)b.classList.add('is-active');})()</script>
</body>
