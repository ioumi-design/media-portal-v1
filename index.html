<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accor Media Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="components/components.css?v=7" />
  <style>
    /* ── Page-specific design tokens ─────────────────────────────────── */
    :root {
      /* Typography */
      --fs-display-sm:        28px;
      --lh-display-sm:        36px;
      --ls-display-condensed: -0.3px;
      --fs-title-md:          16px;
      --lh-title-md:          24px;
      --fs-title-sm:          15px;
      --fs-body-md:           15px;
      --lh-body-md:           22px;
      --fs-body-sm:           14px;
      --lh-body-sm:           20px;
      --fs-label-lg:          16px;
      --lh-label-lg:          24px;
      --fs-input:             16px;
      --lh-input:             24px;
      /* Spacing */
      --stack-lg:    24px;
      --stack-xs:     8px;
      --inline-xs:    8px;
      --inline-sm:    8px;
      --inline-md:   12px;
      --inset-sm:    12px;
      --inset-md:    16px;
      --squish-sm-v:  8px;
      --squish-sm-h: 16px;
      --squish-md-v: 10px;
      --squish-md-h: 16px;
      /* Borders */
      --border-width:    1px;
      --br-element-full: 100px;
      --br-input:        6px;
      /* Layout */
      --side-panel-width: 320px;
      /* Colors */
      --color-search-btn: var(--color-accent);
    }

    /* ══════════════════════════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════════════════════════ */

    /* Page body: side-by-side layout */
    .page-body { flex-direction: row; overflow: hidden; }

    /* Left content column — 独立スクロール、残り幅をすべて使用 */
    .content-area {
      flex: 1;
      min-width: 0;
      padding: 36px var(--grid-margin) 48px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      height: 100%;
      background: var(--color-surface-container-mid);
    }

    /* Right filter panel */
    /* .filter-panel layout moved to the FILTER PANEL section below */

    /* ══════════════════════════════════════════════════════════════
       HEADING + SEARCH AREA
    ══════════════════════════════════════════════════════════════ */
    .heading-search {
      display: flex;
      flex-direction: column;
      gap: var(--stack-lg);
      margin-bottom: 24px;
    }

    .page-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: var(--fs-display-sm);
      line-height: var(--lh-display-sm);
      letter-spacing: var(--ls-display-condensed);
      color: var(--color-on-surface-hi);
    }

    /* Search row */
    .search-row {
      display: flex;
      align-items: center;
      gap: var(--inline-xs);
      width: 100%;
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--inline-xs);
      background: var(--color-surface-container-low);
      border: var(--border-width) solid var(--color-outline-hi);
      border-radius: var(--br-input);
      padding: var(--squish-md-v) var(--squish-md-h);
      height: 48px;
    }
    .search-input-wrap:focus-within {
      border-color: var(--color-accent);
      outline: 2px solid color-mix(in srgb, var(--color-accent) 20%, transparent);
    }
    .search-input-wrap svg { flex-shrink: 0; color: var(--color-on-surface-low); }
    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: var(--fs-input);
      line-height: var(--lh-input);
      color: var(--color-on-surface-placeholder);
      background: transparent;
    }
    .btn-search {
      background: var(--color-search-btn);
      border: none;
      border-radius: var(--br-element-full);
      height: 48px;
      padding: var(--squish-md-v) var(--squish-md-h);
      font-family: var(--font-label);
      font-size: var(--fs-label-lg);
      line-height: var(--lh-label-lg);
      color: var(--color-on-accent);
      white-space: nowrap;
    }
    .btn-search:hover { filter: brightness(1.1); }

    /* View mode buttons */
    .viewmode-group {
      display: flex;
      align-items: center;
    }
    .viewmode-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: var(--br-element-full);
      color: var(--color-primary-alt);
    }
    .viewmode-btn--selected { color: var(--color-accent); }
    .viewmode-btn:hover { background: #1e1852; color: #f9f9ff; }
    .viewmode-btn:hover svg path,
    .viewmode-btn:hover svg rect { stroke: #f9f9ff; }
    .viewmode-btn svg { display: block; }

    /* Results bar */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .results-count {
      font-family: var(--font-body);
      font-size: var(--fs-body-sm);
      line-height: var(--lh-body-sm);
      color: var(--color-on-surface-low);
    }
    .sort-label {
      display: flex;
      align-items: center;
      gap: var(--inline-xs);
      font-family: var(--font-label);
      font-size: var(--fs-label-lg);
      line-height: var(--lh-label-lg);
      color: var(--color-primary);
    }

    /* ══════════════════════════════════════════════════════════════
       ASSET CARDS GRID
    ══════════════════════════════════════════════════════════════ */
    .cards-section { flex: 1; }

    /* ---- GRID VIEW ---- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .asset-card {
      background: var(--color-surface);
      border-radius: var(--br-surface);
      overflow: visible;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .asset-card__image-link {
      display: block;
      text-decoration: none;
      border-radius: var(--br-surface) var(--br-surface) 0 0;
      overflow: hidden;
    }

    .asset-card__image {
      position: relative;
      aspect-ratio: 296 / 197;
      background: var(--color-card-image-bg);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .asset-card__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* placeholder mountains SVG when no image */
    .asset-card__image-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* favorite button overlay */
    .asset-card__fav {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border-radius: var(--br-element-full);
      background: var(--color-surface-container-low);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-on-surface-hi);
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    /* icon visibility: show outline by default, filled when added */
    .asset-card__fav .fav-icon-outline { display: block; }
    .asset-card__fav .fav-icon-filled  { display: none; }
    .asset-card__fav.is-added .fav-icon-outline { display: none; }
    .asset-card__fav.is-added .fav-icon-filled  { display: block; }
    /* hover — dark navy bg, white icon (currentColor cascades to SVG) */
    .asset-card__fav:hover {
      background: #1e1852;
      color: #f9f9ff;
    }
    /* pressed / active */
    .asset-card__fav:active {
      background: #524f81;
      color: #f9f9ff;
    }
    /* tooltip */
    .asset-card__fav .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-surface);
      color: var(--color-on-surface-mid);
      font-size: 14px;
      line-height: 20px;
      padding: 8px 12px;
      border-radius: var(--br-surface);
      box-shadow: 0 8px 16px rgba(0,0,0,.05), 0 2px 6px rgba(0,0,0,.08);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease;
      transition-delay: 0s;
      z-index: 10;
    }
    .asset-card__fav .tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--color-surface);
    }
    .asset-card__fav:hover .tooltip {
      opacity: 1;
      transition-delay: 0.5s;
    }

    /* card body */
    .asset-card__body {
      display: flex;
      flex-direction: column;
      gap: var(--inline-md);
      padding: var(--inset-md);
    }

    .asset-card__title {
      font-family: var(--font-title);
      font-weight: 500;
      font-size: var(--fs-title-md);
      line-height: var(--lh-title-md);
      color: var(--color-on-surface-hi);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .asset-card__title--link { text-decoration: none; display: block; }
    .asset-card__title--link:hover { text-decoration: underline; }
    .asset-row__title--link { text-decoration: none; color: inherit; }
    .asset-row__title--link:hover { text-decoration: underline; }
    .asset-row__thumb-link { display: block; flex-shrink: 0; text-decoration: none; }

    /* detail list */
    .asset-card__details {
      background: var(--color-surface-container-mid);
      border-radius: var(--br-surface);
      padding: var(--inset-sm) var(--inset-md);
      display: flex;
      flex-direction: column;
      gap: var(--stack-xs);
    }
    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-body);
      font-size: var(--fs-body-md);
      line-height: var(--lh-body-md);
      white-space: nowrap;
    }
    .detail-row__label { font-weight: 500; color: var(--color-on-surface-hi); }
    .detail-row__value { font-weight: 400; color: var(--color-on-surface-mid); }
    .detail-sep {
      height: 1px;
      background: var(--color-outline-mid);
    }

    /* action row */
    .asset-card__actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--inline-xs);
    }
    .btn-icon-outline {
      width: 40px;
      height: 40px;
      border-radius: var(--br-element-full);
      border: var(--border-width) solid var(--color-primary);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      flex-shrink: 0;
    }
    .btn-icon-outline:hover { background: #1e1852; color: #f9f9ff; border-color: #1e1852; }
    .btn-icon-outline:hover svg path { fill: #f9f9ff; stroke: none; }
    .btn-add {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--inline-xs);
      background: var(--color-primary);
      border: none;
      border-radius: var(--br-element-full);
      padding: var(--squish-sm-v) var(--squish-sm-h);
      font-family: var(--font-label);
      font-size: var(--fs-label-lg);
      font-weight: 400;
      line-height: var(--lh-label-lg);
      color: var(--color-on-primary);
      white-space: nowrap;
    }
    .btn-add:hover { background: #1a0060; }

    /* ---- LIST VIEW ---- */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .asset-row {
      background: var(--color-surface);
      border-radius: var(--br-surface);
      display: grid;
      grid-template-columns: 120px minmax(0,1fr) auto;
      gap: var(--inline-md);
      align-items: center;
      padding: var(--inline-sm);
      border: var(--border-width) solid var(--color-outline-low);
    }
    .asset-row__thumb {
      height: 80px;
      border-radius: var(--br-surface);
      background: var(--color-card-image-bg);
      overflow: hidden;
    }
    .asset-row__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .asset-row__title {
      font-family: var(--font-title);
      font-size: var(--fs-title-sm);
      font-weight: 500;
      color: var(--color-on-surface-hi);
      margin-bottom: 4px;
    }
    .asset-row__meta {
      font-size: var(--fs-body-sm);
      color: var(--color-on-surface-low);
    }
    .asset-row__actions {
      display: flex;
      align-items: center;
      gap: var(--inline-xs);
    }

    /* ══════════════════════════════════════════════════════════════
       FILTER PANEL (RIGHT) — Figma 実測値に完全準拠
       node: 6804:17885 (🧩 mp.panel-right)
    ══════════════════════════════════════════════════════════════ */

    /* Panel outer — 独立スクロール */
    .filter-panel {
      flex: 0 0 var(--side-panel-width);
      width: var(--side-panel-width);
      max-width: var(--side-panel-width);
      border-left: 1px solid #dadadd;
      background: #ffffff;
      padding: 0 0 44px;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      height: 100%;
    }

    /* ── Side heading (user info + cart) ── */
    .fp-side-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 80px;
      padding: 16px 20px;
      border-bottom: 1px solid #dadadd;
      flex-shrink: 0;
    }
    .fp-side-heading__left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }
    .fp-avatar {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 100px;
      background: #6f6e77;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .fp-user-name {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: #252339;
    }
    .fp-cart {
      flex-shrink: 0;
      width: 58px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .fp-cart__badge {
      position: absolute;
      top: 12px;
      right: 8px;
      background: #068484;
      border-radius: 100px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 12px;
      line-height: 16px;
      color: #ffffff;
    }

    /* ── Inner content wrapper (gap-16px between sections) ── */
    .fp-inner {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 20px 0;
      flex: 1;
    }

    /* ── Top header: "Filters" + Reset ── */
    .fp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fp-title {
      font-family: var(--font-title);
      font-weight: 500;
      font-size: 20px;            /* title/md */
      line-height: 24px;
      color: #252339;
    }
    .fp-reset {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #ffffff;
      border: none;
      border-radius: 100px;
      padding: 8px 12px;          /* squish/sm */
      font-family: var(--font-label);
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: #1e1852;             /* primary */
      opacity: 0.38;              /* Figma: disabled/ghosted state */
      cursor: pointer;
    }
    .fp-reset:hover { opacity: 1; background: #1e1852; color: #f9f9ff; }
    .fp-reset:hover svg path { stroke: #f9f9ff; }

    /* ── Save filters button ── */
    .fp-save {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #ffffff;
      border: 1px solid #1e1852;  /* tertiary border */
      border-radius: 100px;
      padding: 12px 16px;         /* squish/md */
      font-family: var(--font-label);
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: #1e1852;
      cursor: pointer;
    }
    .fp-save:hover { background: #1e1852; color: #f9f9ff; border-color: #1e1852; }
    .fp-save:hover svg path { stroke: #f9f9ff; }

    /* ── Filters section wrapper ── */
    .fp-filters {
      display: flex;
      flex-direction: column;
      padding-bottom: 1px;
    }

    /* ── Outer accordion: "Brands" ── */
    .fp-brands {
      border-bottom: 1px solid #dadadd;
      padding: 16px 0;            /* pinchVertical/md */
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: -1px;
    }
    .fp-brands-header {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      width: 100%;
      text-align: left;
    }
    .fp-brands-label {
      flex: 1;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 18px;            /* custom: Figma value */
      line-height: 24px;
      color: #252339;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Minus / Plus chevron for Brands */
    .fp-brands-chevron {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      position: relative;
    }
    .fp-brands-chevron::before {
      content: '';
      position: absolute;
      top: 45.83%;
      left: 16.67%;
      right: 16.67%;
      bottom: 47.92%;
      background: #1e1852;
      border-radius: 50px;
    }
    /* When collapsed: also show vertical bar = plus */
    .fp-brands-chevron.is-plus::after {
      content: '';
      position: absolute;
      left: 45.83%;
      top: 16.67%;
      right: 47.92%;
      bottom: 16.67%;
      background: #1e1852;
      border-radius: 50px;
    }

    /* Slot inside Brands (indented) */
    .fp-brands-slot {
      padding-left: 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .fp-brands-slot.is-collapsed { display: none; }

    /* ── Sub-accordion rows (ALL / Economy / Midscale / Premium) ── */
    .fp-acc {
      border-top: 1px solid #dadadd;
      width: 100%;
    }
    .fp-acc-header {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
      padding: 16px 0;            /* pinchVertical/md */
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .fp-acc-label {
      flex: 1;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: #252339;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fp-acc-chevron {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      transition: transform 0.2s;
    }
    .fp-acc-chevron.is-down { transform: rotate(180deg); }

    /* Expanded content */
    .fp-acc-body {
      padding-right: 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .fp-acc-body.is-collapsed { display: none; }

    /* ── Checkbox row ── */
    .fp-cb {
      display: flex;
      align-items: center;
      gap: 8px;                   /* inline/xs */
    }
    /* "Select all" has pb-16px as visual separator */
    .fp-cb--select-all { padding-bottom: 16px; }

    .fp-cb__box {
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border: 1px solid #8b8a93;  /* outline-hi */
      border-radius: 2px;         /* checkbox/radius */
      background: #ffffff;
      cursor: pointer;
      position: relative;
    }
    .fp-cb__box:checked {
      background: #1e1852;
      border-color: #1e1852;
    }
    .fp-cb__box:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #ffffff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .fp-cb__box:focus-visible { outline: 2px solid #1e1852; outline-offset: 2px; }

    .fp-cb label {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: #3e3d48;             /* on-surface-mid (all theme) */
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Top-level collapsed accordion (Rights / General information) ── */
    /* These are mp.accordion-filter with just header, no slot (collapsed) */
    .fp-top-acc {
      border-top: 1px solid #dadadd;
      border-bottom: 1px solid #dadadd;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: -1px;
    }
    .fp-top-acc--no-bottom {
      border-bottom: none;
    }
    .fp-top-acc__btn {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      padding: 0;
      text-align: left;
    }
    .fp-top-acc__label {
      flex: 1;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 18px;
      line-height: 24px;
      color: #252339;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fp-top-acc__chevron {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      transition: transform 0.2s;
    }
    .fp-top-acc__body {
      display: none;
      flex-direction: column;
      gap: 0;
    }
    .fp-top-acc__body.is-open {
      display: flex;
    }

    /* Sub-accordions inside Rights / General information */
    .fp-top-acc__body {
      padding-left: 12px;          /* same indent as fp-brands-slot */
    }
    .fp-top-acc__body .fp-acc {
      border-top: 1px solid #dadadd;
      width: 100%;
    }
    .fp-top-acc__body .fp-acc-header {
      padding: 16px 0;
    }
    .fp-top-acc__body .fp-acc-body {
      padding-right: 32px;
    }

    /* ── Form inputs (Location, date fields, image width) ── */
    .fp-input-wrap {
      padding: 0 0 12px;
      width: 100%;
    }
    .fp-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #dadadd;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: #252339;
      background: #ffffff;
      outline: none;
    }
    .fp-input::placeholder { color: #6f6e77; }
    .fp-input:focus { border-color: #1e1852; }

    /* Date input with calendar icon */
    .fp-date-row {
      position: relative;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    .fp-date-row:last-child { margin-bottom: 12px; }
    .fp-date-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #6f6e77;
    }
    .fp-date-row input[type="text"],
    .fp-date-row input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #dadadd;
      border-radius: 6px;
      padding: 10px 12px 10px 40px;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 16px;
      line-height: 24px;
      color: #252339;
      background: #ffffff;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .fp-date-row input::placeholder { color: #6f6e77; }
    .fp-date-row input:focus { border-color: #1e1852; }

    /* ══════════════════════════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════════════════════════ */
    /* ══════════════════════════════════════════════════════════════
       SAVE TO COLLECTION MODAL
    ══════════════════════════════════════════════════════════════ */

    /* Body: no padding so preview sits flush at top */
    #save-modal .modal__body {
      padding: 0;
      gap: 0;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Asset preview thumbnail */
    .modal__preview {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 213px;
      padding: 20px 40px;
      background: var(--color-surface-container-low);
      border-bottom: 1px solid var(--color-outline-low);
    }
    .modal__preview svg {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 8px;
      display: block;
    }

    /* ── Fix: stack modals vertically in save overlay ── */
    #save-modal { flex-direction: column; align-items: center; }

    /* ── Scrollable card area ── */
    .modal__coll-scroll {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px 16px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    /* "Create new collection" dashed card */
    .modal__create-card {
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 20px;
      width: 100%;
      background: #fff;
      border: 1px dashed #dadadd;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 120ms;
      box-sizing: border-box;
    }
    .modal__create-card:hover { background: #f4f4f5; }
    .modal__create-card__icon {
      width: 40px; height: 40px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-primary);
    }
    .modal__create-card__label {
      font-size: 18px;
      line-height: 24px;
      font-weight: 500;
      color: var(--color-on-surface-hi);
    }

    /* Collection list */
    .modal__coll-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Collection item card */
    .modal__coll-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px;
      border: 1px solid #dadadd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 120ms;
      font-family: var(--font-body);
      box-sizing: border-box;
    }
    .modal__coll-item:hover { background: #f4f4f5; }
    .modal__coll-item--selected { background: #eef7f7; }
    .modal__coll-item--selected:hover { background: #e0f0f0; }
    .modal__coll-item--full,
    .modal__coll-item--already { cursor: default; }
    .modal__coll-item--full:hover,
    .modal__coll-item--already:hover { background: #f4f4f5; }

    /* Thumbnail */
    .mcol-thumb {
      border: 1px solid #dadadd;
      border-radius: 2px;
      padding: 4px;
      background: #fff;
      flex-shrink: 0;
    }
    .mcol-thumb__inner {
      width: 52px;
      height: 52px;
      background: #6f6e77;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mcol-thumb__inner img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Scrollable collection list */
    .modal__coll-list {
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #c8c6d4 transparent;
    }
    .modal__coll-list::-webkit-scrollbar { width: 4px; }
    .modal__coll-list::-webkit-scrollbar-thumb { background: #c8c6d4; border-radius: 2px; }

    /* Info */
    .mcol-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .mcol-name {
      font-size: 18px; line-height: 24px; font-weight: 500;
      color: #252339;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mcol-count { font-size: 14px; line-height: 20px; color: #6f6e77; }

    /* Checkbox (empty — shown on hover for selectable items) */
    .mcol-cb { flex-shrink: 0; width: 18px; height: 18px; border-radius: 2px; display: none; align-items: center; justify-content: center; }
    .modal__coll-item:not(.modal__coll-item--full):not(.modal__coll-item--already):not(.modal__coll-item--selected):hover .mcol-cb--empty {
      display: flex;
      border: 1px solid #8b8a93;
      background: #fff;
    }
    /* Checked checkbox — always visible for selected */
    .modal__coll-item--selected .mcol-cb--checked {
      display: flex;
      background: #068484;
    }

    /* Badges */
    .mcol-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; line-height: 16px;
      padding: 4px 8px; border-radius: 4px;
      white-space: nowrap; flex-shrink: 0;
    }
    .mcol-badge--full  { background: #fef7df; color: #332d0f; }
    .mcol-badge--added { background: #e6f3eb; color: #117846; }

    /* "See collection" link — hidden by default, appears on hover of full/already */
    .mcol-see {
      display: none !important; align-items: center; gap: 4px;
      font-size: 14px; line-height: 20px;
      color: #1264a3;
      white-space: nowrap; flex-shrink: 0;
    }
    .modal__coll-item--full:hover .mcol-badge,
    .modal__coll-item--already:hover .mcol-badge { display: none !important; }
    .modal__coll-item--full:hover .mcol-see,
    .modal__coll-item--already:hover .mcol-see { display: flex !important; }

    /* Footer buttons */
    .modal__btn-close {
      padding: 12px 20px;
      background: none;
      border: 1.5px solid var(--color-primary);
      border-radius: 100px;
      font-size: 16px;
      line-height: 24px;
      color: var(--color-primary);
      cursor: pointer;
      font-family: var(--font-body);
    }
    .modal__btn-close:hover { background: rgba(30,24,82,.06); }
    .modal__btn-validate {
      padding: 12px 20px;
      background: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      border-radius: 100px;
      font-size: 16px;
      line-height: 24px;
      color: #fff;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .modal__btn-validate:hover { background: #152238; }

    /* Error */
    .modal__error {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #FEF2F2;
      border-radius: 8px;
      font-size: 14px;
      line-height: 20px;
      color: #DC2626;
      margin-bottom: 8px;
    }
    .modal__error[hidden] { display: none !important; }

    /* Input with clear button */
    .modal__input-wrap { position: relative; width: 100%; }
    .modal__input-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-on-surface-low);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }
    .modal__input-clear.is-visible { display: flex; }

    .site-footer {
      flex-shrink: 0;             /* フッターを常に最下部に固定 */
      background: var(--color-surface);
      border-top: var(--border-width) solid var(--color-outline-low);
      padding: 12px var(--grid-margin);
    }
    .site-footer__inner {
      width: 100%;
      max-width: none;
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--fs-body-sm);
      color: var(--color-on-surface-low);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  </style>
</head>

    function _placeholder(i) {

      const isFav  = DB.isInAnyCollection(d.id);

          <span class="tooltip">${favTip}</span>
        </button>

            <button class="btn-add${inCart ? ' btn-add--active' : ''}" type="button" data-asset-id="${d.id}" onclick="event.stopPropagation();toggleCart(this,'${d.id}')">${ICON_CART} ${cartLabel}</button>
          </div>
        </div>
      </article>`;
    }

    function _buildListRow(d, i) {
      const p = PLACEHOLDER_COLORS[i % PLACEHOLDER_COLORS.length];
      const thumbContent = d.thumbnail
        ? `<img src="${d.thumbnail}" alt="${d.title}" style="width:100%;height:100%;object-fit:cover;">`
        : `<div style="width:100%;height:100%;background:var(--color-card-image-bg);display:flex;align-items:center;justify-content:center;"><svg width="50" height="38" viewBox="0 0 80 60" fill="none"><circle cx="32" cy="16" r="8" fill="${p.circle}"/><polygon points="0,60 44,16 80,60" fill="${p.poly1}"/><polygon points="36,60 56,30 76,60" fill="${p.poly2}"/></svg></div>`;
      const inCart = DB.isInCart(d.id);
      const cartLabel = inCart ? 'Remove' : 'Add';
      return `<article class="asset-row" data-asset-id="${d.id}">
        <a href="asset-detail.html?id=${d.id}" class="asset-row__thumb-link" aria-label="View ${d.title} details"><div class="asset-row__thumb">${thumbContent}</div></a>
        <div><a href="asset-detail.html?id=${d.id}" class="asset-row__title asset-row__title--link">${d.title}</a><div class="asset-row__meta">${d.type} · ${d.sizeDisplay || d.size} · ${d.resolution || d.res || '—'}</div></div>

          <button class="btn-icon-outline" type="button" aria-label="Email">${ICON_EMAIL}</button>
          <button class="btn-add${inCart ? ' btn-add--active' : ''}" style="flex:none;padding:8px 16px;" type="button" data-asset-id="${d.id}" onclick="event.stopPropagation();toggleCart(this,'${d.id}')">${ICON_CART} ${cartLabel}</button>
        </div>
      </article>`;

    function renderCards(assets) {
      const countEl = document.querySelector('.results-count');
      if (countEl) countEl.textContent = assets.length + ' results';
      const gridEl = document.getElementById('view-grid');
      const listEl = document.getElementById('view-list');
      let gridHTML = '';
      let listHTML = '';
      for (let i = 0; i < assets.length; i++) {
        gridHTML += _buildGridCard(assets[i], i);
        listHTML += _buildListRow(assets[i], i);
      }
      if (gridEl) gridEl.innerHTML = gridHTML;
      if (listEl) listEl.innerHTML = listHTML;
    }

    function updateCartBadge() {
      var n = DB.getCartCount();
      document.querySelectorAll('.cart-badge').forEach(function (b) { b.textContent = n; });
    }

    function toggleCart(btn, assetId) {
      if (DB.isInCart(assetId)) {
        DB.removeFromCart(assetId);
        btn.innerHTML = ICON_CART + ' Add';
        btn.classList.remove('btn-add--active');
      } else {
        DB.addToCart(assetId);
        btn.innerHTML = ICON_CART + ' Remove';
        btn.classList.add('btn-add--active');
      }
      updateCartBadge();
    }

    document.addEventListener('DOMContentLoaded', function () {
      updateCartBadge();

      var inp = document.querySelector('.search-input');

      /* Search within active dataset */
      function doSearch() {
        var q = inp ? inp.value.trim() : '';
        var isScen1 = localStorage.getItem('mp_scenario') === '1' && window.SUMMER_ASSETS;
        if (isScen1) {
          var ql = q.toLowerCase();
          var filtered = q ? window.SUMMER_ASSETS.filter(function (a) {
            return (a.title && a.title.toLowerCase().indexOf(ql) >= 0)
              || (a.description && a.description.toLowerCase().indexOf(ql) >= 0)
              || (a.brand && a.brand.toLowerCase().indexOf(ql) >= 0)
              || (a.smartTags && a.smartTags.some(function (t) { return t.toLowerCase().indexOf(ql) >= 0; }))
              || (a.tags && a.tags.some(function (t) { return t.toLowerCase().indexOf(ql) >= 0; }));
          }) : window.SUMMER_ASSETS;
          renderCards(filtered);
        } else {
          DB.searchAssets(q).then(renderCards);
        }
      }

      var btn = document.querySelector('.btn-search');
      if (btn) btn.addEventListener('click', doSearch);
      if (inp) inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });

      /* Initial load — check for summer scenario */
      var initialSearch = localStorage.getItem('mp_initial_search');
      if (initialSearch === 'summer' && window.SUMMER_ASSETS) {
        if (inp) inp.value = 'summer';
        renderCards(window.SUMMER_ASSETS);
      } else {
        DB.getAssets().then(renderCards);
      }
    });

    /* ── View mode toggle ─────────────────────────────────────────── */
    function setView(mode) {
      const gridBtn  = document.getElementById('btn-grid');
      const listBtn  = document.getElementById('btn-list');
      const gridView = document.getElementById('view-grid');
      const listView = document.getElementById('view-list');

      if (mode === 'grid') {
        gridView.style.display = 'grid';
        listView.style.display = 'none';
        gridBtn.classList.add('viewmode-btn--selected');
        listBtn.classList.remove('viewmode-btn--selected');
        gridBtn.setAttribute('aria-pressed', 'true');
        listBtn.setAttribute('aria-pressed', 'false');
      } else {
        gridView.style.display = 'none';
        listView.style.display = 'flex';
        listBtn.classList.add('viewmode-btn--selected');
        gridBtn.classList.remove('viewmode-btn--selected');
        listBtn.setAttribute('aria-pressed', 'true');
        gridBtn.setAttribute('aria-pressed', 'false');
      }
    }

    /* ── Filter accordion (top-level) ─────────────────────────────── */
    /* ── Brands outer accordion (minus ↔ plus chevron) ─────────── */
    /* ── Favorite (heart) button toggle ─────────────────────────── */

    function toggleFav(btn) {
      /* Always open modal — filled state shows "Already added" collections at top */
      openSaveModal(btn);
    }
    /* Called after user saves (e.g. creates collection) to mark heart filled */
    function markFavAdded(btn) {
      if (!btn) return;
      btn.classList.add('is-added');
      btn.setAttribute('aria-label', 'See saved collection');
      const tip = btn.querySelector('.tooltip');
      if (tip) tip.textContent = 'See saved collection';
    }

    function toggleBrands(btn) {
      const slot    = document.getElementById('fp-brands-slot');
      const chevron = btn.querySelector('.fp-brands-chevron');
      const isOpen  = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      slot.classList.toggle('is-collapsed', isOpen);
      chevron.classList.toggle('is-plus', isOpen);
    }

    /* ── Sub-accordion (ALL / Economy / Midscale / Premium / etc.) ─ */
    function toggleAcc(btn) {
      const body    = btn.nextElementSibling;
      const chevron = btn.querySelector('.fp-acc-chevron');
      const isOpen  = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      body.classList.toggle('is-collapsed', isOpen);
      /* chevron starts pointing UP (expanded). When collapsed, rotate 180° = pointing down */
      chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    /* ── Top-level accordion (Rights / General information) ────────── */
    /* These start collapsed (plus icon). Click toggles open/close. */
    function toggleTopAcc(btn) {
      const body    = btn.nextElementSibling;
      const icon    = btn.querySelector('.fp-top-acc__chevron path');
      const isOpen  = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      body.classList.toggle('is-open', !isOpen);
      /* plus ↔ minus icon */
      if (isOpen) {
        icon.setAttribute('d', 'M12 5v14M5 12h14'); /* back to plus */
      } else {
        icon.setAttribute('d', 'M5 12h14');          /* minus */
      }
    }
  </script>

      <div id="create-error" class="modal__error" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" fill="#BA1F1A"/>
          <line x1="12" y1="9" x2="12" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12.01" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Please name your collection title.
      </div>
      <div class="modal__form">
        <div class="modal__field">
          <label class="modal__field-label" for="coll-title-input">Collection title</label>
          <div class="modal__input-wrap">
            <input class="modal__input" id="coll-title-input" type="text"
              placeholder="Collection title" autocomplete="off"
              oninput="onTitleInput(this)"/>
            <button class="modal__input-clear" id="coll-title-clear" type="button"
              aria-label="Clear" onclick="clearTitleInput()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="modal__field">
          <label class="modal__field-label" for="coll-desc-input">
            Description <span class="modal__field-label--opt">(optional)</span>
          </label>
          <textarea class="modal__textarea" id="coll-desc-input"
            placeholder="Description of the collection"></textarea>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="modal__btn-close" type="button" onclick="closeCreateStep()">Close</button>
      <button class="modal__btn-validate" type="button" onclick="onValidateCreate()">Validate</button>
    </div>
  </div>

</div>

<script>
  var _saveModalTriggerBtn = null;
  var _saveModalThumbnail  = '';
  var _createdCollections  = [];
  var _dbCollections       = []; /* loaded from DB when modal opens */

  function _setModalPreviews(thumbnailUrl) {
    var svgFallback = '<svg viewBox="0 0 320 213" fill="none"><rect width="320" height="213" fill="#e8e6f0"/><polygon points="60,175 165,68 270,175" fill="#3b3768" opacity="0.65"/><polygon points="30,175 115,105 200,175" fill="#9896b8" opacity="0.55"/><circle cx="220" cy="72" r="14" fill="#c9a830"/></svg>';
    var content = thumbnailUrl
      ? '<img src="' + thumbnailUrl + '" alt="" style="height:213px;width:auto;max-width:100%;object-fit:contain;display:block;">'
      : svgFallback;
    document.querySelectorAll('.modal__preview').forEach(function(el) { el.innerHTML = content; });
  }
  function openSaveModal(triggerBtn) {
    _saveModalTriggerBtn = triggerBtn || null;
    _saveModalThumbnail  = (triggerBtn && triggerBtn.dataset.thumbnail) || '';
    _createdCollections  = [];
    document.getElementById('modal-view-save').hidden = false;
    document.getElementById('modal-view-create').hidden = true;
    document.getElementById('modal-validate-save').hidden = true;
    _setModalPreviews(_saveModalThumbnail);
    document.getElementById('save-modal').hidden = false;
    document.body.style.overflow = 'hidden';
    /* Load collections + assets to resolve first-asset thumbnail */
    var _modalAssetId = (triggerBtn && triggerBtn.dataset.assetId) || null;
    Promise.all([DB.getCollections(), DB.getAssets()]).then(function (results) {
      var cols   = results[0];
      var assets = results[1];
      var already = [];
      var others  = [];
      cols.forEach(function (c) {
        var hasAsset   = _modalAssetId && c.assetIds && c.assetIds.indexOf(_modalAssetId) >= 0;
        var firstAsset = c.assetIds && c.assetIds[0]
          ? assets.find(function (a) { return a.id === c.assetIds[0]; }) : null;
        var item = {
          id: c.id, title: c.title, count: c.assetIds ? c.assetIds.length : 0,
          thumbnailUrl: firstAsset ? firstAsset.thumbnail : null,
          _status: hasAsset ? 'already' : 'default'
        };
        if (hasAsset) already.push(item); else others.push(item);
      });
      _dbCollections = already.concat(others);
      renderModalCollections();
    });
  }
  function closeSaveModal() {
    document.getElementById('save-modal').hidden = true;
    document.body.style.overflow = '';
  }
  function showCreateStep() {
    document.getElementById('modal-view-save').hidden = true;
    document.getElementById('modal-view-create').hidden = false;
    _setModalPreviews(_saveModalThumbnail);
    document.getElementById('coll-title-input').value = '';
    document.getElementById('coll-desc-input').value = '';
    document.getElementById('coll-title-clear').classList.remove('is-visible');
    document.getElementById('create-error').hidden = true;
    setTimeout(function() { document.getElementById('coll-title-input').focus(); }, 50);
  }
  function closeCreateStep() {
    document.getElementById('modal-view-create').hidden = true;
    document.getElementById('modal-view-save').hidden = false;
    document.getElementById('create-error').hidden = true;
  }
  function onTitleInput(input) {
    document.getElementById('coll-title-clear').classList.toggle('is-visible', input.value.length > 0);
    if (input.value.trim()) document.getElementById('create-error').hidden = true;
  }
  function clearTitleInput() {
    var input = document.getElementById('coll-title-input');
    input.value = '';
    document.getElementById('coll-title-clear').classList.remove('is-visible');
    input.focus();
  }
  function onValidateCreate() {
    var title = document.getElementById('coll-title-input').value.trim();
    if (!title) {
      document.getElementById('create-error').hidden = false;
      document.getElementById('coll-title-input').focus();
      return;
    }
    var desc = document.getElementById('coll-desc-input').value.trim();
    _createdCollections.push({ title: title, desc: desc, selected: true });
    closeCreateStep();
    renderModalCollections();
    document.getElementById('modal-validate-save').hidden = false;
  }
  var SVG_CB_CHECK = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var SVG_CHECK_GREEN = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var SVG_WARN = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16.5" r="0.7" fill="white"/></svg>';
  var SVG_ARROW_RIGHT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="12 5 19 12 12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var SVG_IMG_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="rgba(255,255,255,0.6)"/><path d="M21 15l-5-5L9 17" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function _mcollThumb(url) {
    var inner = url
      ? '<img src="' + url + '" alt="">'
      : SVG_IMG_ICON;
    return '<div class="mcol-thumb"><div class="mcol-thumb__inner">' + inner + '</div></div>';
  }

  function _collItemHtml(coll, type, idx) {
    var cls = 'modal__coll-item';
    var right = '';
    var onclick = '';
    var st = coll.status || (coll.selected ? 'selected' : 'default');

    if (st === 'selected') {
      cls += ' modal__coll-item--selected';
      right = '<div class="mcol-cb mcol-cb--checked">' + SVG_CB_CHECK + '</div>';
      onclick = 'onclick="toggleColl(\'' + type + '\',' + idx + ')"';
    } else if (st === 'default') {
      right = '<div class="mcol-cb mcol-cb--empty"></div>';
      onclick = 'onclick="toggleColl(\'' + type + '\',' + idx + ')"';
    } else if (st === 'already') {
      cls += ' modal__coll-item--already';
      right = '<span class="mcol-badge mcol-badge--added">' + SVG_CHECK_GREEN + ' Already added</span>'
        + '<span class="mcol-see">' + SVG_ARROW_RIGHT + ' See collection</span>';
      var destAlready = coll.id ? 'collection.html?id=' + coll.id : 'collection.html';
      onclick = 'onclick="closeSaveModal();location.href=\'' + destAlready + '\'"';
    } else if (st === 'full') {
      cls += ' modal__coll-item--full';
      right = '<span class="mcol-badge mcol-badge--full">' + SVG_WARN + ' Collection full</span>'
        + '<span class="mcol-see">' + SVG_ARROW_RIGHT + ' See collection</span>';
      var destFull = coll.id ? 'collection.html?id=' + coll.id : 'collection.html';
      onclick = 'onclick="closeSaveModal();location.href=\'' + destFull + '\'"';
    }

    return '<button class="' + cls + '" type="button" ' + onclick + '>'
      + _mcollThumb(coll.thumbnailUrl || null)
      + '<div class="mcol-info">'
      +   '<span class="mcol-name">' + coll.title + '</span>'
      +   '<span class="mcol-count">Assets (' + (coll.count || 0) + ')</span>'
      + '</div>'
      + right
      + '</button>';
  }

  function toggleColl(type, idx) {
    if (type === 'created') {
      _createdCollections[idx].selected = !_createdCollections[idx].selected;
    } else {
      var c = _dbCollections[idx];
      if (c._status === 'default') c._status = 'selected';
      else if (c._status === 'selected') c._status = 'default';
    }
    renderModalCollections();
    _syncValidateBtn();
  }

  function _syncValidateBtn() {
    var anySelected = _createdCollections.some(function(c) { return c.selected; })
      || _dbCollections.some(function(c) { return c._status === 'selected'; });
    document.getElementById('modal-validate-save').hidden = !anySelected;
  }

  function renderModalCollections() {
    var list = document.getElementById('modal-coll-list');
    var html = '';
    _createdCollections.forEach(function(coll, idx) {
      html += _collItemHtml({ title: coll.title, count: 0, status: coll.selected ? 'selected' : 'default' }, 'created', idx);
    });
    _dbCollections.forEach(function(coll, idx) {
      html += _collItemHtml({ id: coll.id, title: coll.title, count: coll.count, status: coll._status, thumbnailUrl: coll.thumbnailUrl || null }, 'db', idx);
    });
    list.innerHTML = html;
  }

  function onValidateSave() {
    var assetId = _saveModalTriggerBtn ? (_saveModalTriggerBtn.dataset.assetId || null) : null;
    if (!assetId && _saveModalTriggerBtn) {
      var card = _saveModalTriggerBtn.closest('[data-asset-id]');
      if (card) assetId = card.dataset.assetId;
    }

    var collName = 'collection';
    var collId   = null;

    /* Persist newly-created collections + add asset */
    var promises = [];
    _createdCollections.forEach(function(c) {
      if (!c.selected) return;
      collName = collName === 'collection' ? c.title : collName;
      promises.push(
        DB.createCollection(c.title, c.desc || '').then(function(newCol) {
          if (assetId) return DB.addAssetToCollection(assetId, newCol.id);
        })
      );
    });

    /* Persist asset → existing DB collections */
    _dbCollections.forEach(function(c) {
      if (c._status !== 'selected') return;
      collName = collName === 'collection' ? c.title : collName;
      collId   = collId || c.id;
      if (assetId) promises.push(DB.addAssetToCollection(assetId, c.id));
    });

    if (assetId) DB.addFavorite(assetId);
    if (_saveModalTriggerBtn) markFavAdded(_saveModalTriggerBtn);

    closeSaveModal();
    showSnackbar(collName, collId);
  }

  /* ── Snackbar ──────────────────────────────────────────────────── */
  var _snackbarTimer = null;
  function showSnackbar(collName, collId) {
    var sb = document.getElementById('snackbar');
    document.getElementById('snackbar-text').innerHTML = 'Asset added in<br>' + collName;
    document.getElementById('snackbar-see-link').href = collId ? 'collection.html?id=' + collId : 'hub-collection.html';
    sb.hidden = false;
    sb.offsetHeight; /* force reflow */
    sb.classList.add('is-visible');
    if (_snackbarTimer) clearTimeout(_snackbarTimer);
    _snackbarTimer = setTimeout(closeSnackbar, 3000);
  }
  function closeSnackbar() {
    var sb = document.getElementById('snackbar');
    sb.classList.remove('is-visible');
    setTimeout(function() { sb.hidden = true; }, 300);
    if (_snackbarTimer) { clearTimeout(_snackbarTimer); _snackbarTimer = null; }
  }
  document.getElementById('save-modal').addEventListener('click', function(e) {
    if (e.target === this) closeSaveModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !document.getElementById('save-modal').hidden) closeSaveModal();
  });
</script>

<!-- ══ SNACKBAR ══════════════════════════════════════════════════════════ -->
<div id="snackbar" class="snackbar" hidden role="status" aria-live="polite">
  <svg class="snackbar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="12" fill="#117846"/>
    <polyline points="7,12.5 10.5,16 17,9" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="snackbar__content">
    <span id="snackbar-text">Asset added in</span>
  </div>
  <a href="collection.html" id="snackbar-see-link" class="snackbar__link">See collection</a>
  <button class="snackbar__close" type="button" onclick="closeSnackbar()" aria-label="Close">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
</div>
<script>(function(){var s=localStorage.getItem('mp_scenario')||'1';var b=document.getElementById('scen-btn-'+s);if(b)b.classList.add('is-active');})()</script>
</body>
</html>
